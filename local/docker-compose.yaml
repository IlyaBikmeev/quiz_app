version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: quizz_postgres
    environment:
      POSTGRES_DB: quizz
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
