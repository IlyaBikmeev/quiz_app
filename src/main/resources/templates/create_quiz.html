<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Создать квиз</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<!-- Вставка общей шапки -->
<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-5">
    <h1 class="text-center mb-4">Создать новый квиз</h1>
    <form th:action="@{/quiz}" method="post" id="quizForm">
        <!-- Название квиза -->
        <div class="mb-3">
            <label for="quizTitle" class="form-label">Название квиза</label>
            <input type="text" class="form-control" id="quizTitle" name="title" placeholder="Введите название квиза"
                   required>
        </div>
        <!-- Описание квиза -->
        <div class="mb-3">
            <label for="quizDescription" class="form-label">Описание квиза</label>
            <textarea class="form-control" id="quizDescription" name="description" rows="3"
                      placeholder="Введите описание квиза"></textarea>
        </div>

        <!-- Блок вопросов -->
        <div id="questionsContainer">
            <h4>Вопросы</h4>
            <!-- Первый вопрос -->
            <div class="card mb-3 question-card">
                <div class="card-body">
                    <!-- Галочка для удаления вопроса -->
                    <div class="form-check mb-3">
                        <input class="form-check-input delete-question-checkbox" type="checkbox" id="deleteQuestion0">
                        <label class="form-check-label" for="deleteQuestion0">Удалить этот вопрос</label>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Текст вопроса</label>
                        <input type="text" class="form-control" name="questions[0].text"
                               placeholder="Введите текст вопроса" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Варианты ответов</label>
                        <div class="options-container">
                            <!-- Первый вариант ответа -->
                            <div class="input-group mb-2">
                                <input type="text" class="form-control" name="questions[0].options[0]"
                                       placeholder="Ответ 1" required>
                                <span class="input-group-text">
                                        <input type="checkbox" name="questions[0].correctAnswers" value="0">
                                    </span>
                            </div>
                            <!-- Второй вариант ответа -->
                            <div class="input-group mb-2">
                                <input type="text" class="form-control" name="questions[0].options[1]"
                                       placeholder="Ответ 2" required>
                                <span class="input-group-text">
                                        <input type="checkbox" name="questions[0].correctAnswers" value="1">
                                    </span>
                            </div>
                        </div>
                    </div>
                    <button type="button" class="btn btn-sm btn-secondary addOptionBtn">Добавить вариант</button>
                </div>
            </div>
        </div>

        <!-- Кнопка для добавления нового вопроса -->
        <button type="button" id="addQuestionBtn" class="btn btn-secondary mb-3">Добавить вопрос</button>

        <!-- Кнопка отправки формы -->
        <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg">Создать квиз</button>
        </div>
    </form>
</div>

<script>
    // Индекс для нового вопроса
    let questionIndex = 1;
    document.getElementById('addQuestionBtn').addEventListener('click', function () {
        let questionsContainer = document.getElementById('questionsContainer');
        let questionCard = document.createElement('div');
        questionCard.className = 'card mb-3 question-card';
        questionCard.innerHTML = `
                <div class="card-body">
                    <!-- Галочка для удаления вопроса -->
                    <div class="form-check mb-3">
                        <input class="form-check-input delete-question-checkbox" type="checkbox" id="deleteQuestion${questionIndex}">
                        <label class="form-check-label" for="deleteQuestion${questionIndex}">Удалить этот вопрос</label>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Текст вопроса</label>
                        <input type="text" class="form-control" name="questions[${questionIndex}].text" placeholder="Введите текст вопроса" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label">Варианты ответов</label>
                        <div class="options-container">
                            <div class="input-group mb-2">
                                <input type="text" class="form-control" name="questions[${questionIndex}].options[0]" placeholder="Ответ 1" required>
                                <span class="input-group-text">
                                    <input type="checkbox" name="questions[${questionIndex}].correctAnswers" value="0">
                                </span>
                            </div>
                            <div class="input-group mb-2">
                                <input type="text" class="form-control" name="questions[${questionIndex}].options[1]" placeholder="Ответ 2" required>
                                <span class="input-group-text">
                                    <input type="checkbox" name="questions[${questionIndex}].correctAnswers" value="1">
                                </span>
                            </div>
                        </div>
                    </div>
                    <button type="button" class="btn btn-sm btn-secondary addOptionBtn">Добавить вариант</button>
                </div>
            `;
        questionsContainer.appendChild(questionCard);
        questionIndex++;
    });

    // Делегирование событий для добавления вариантов ответа внутри любого вопроса
    document.getElementById('questionsContainer').addEventListener('click', function (e) {
        if (e.target && e.target.classList.contains('addOptionBtn')) {
            let cardBody = e.target.closest('.card-body');
            let optionsContainer = cardBody.querySelector('.options-container');
            let currentOptions = optionsContainer.querySelectorAll('.input-group').length;
            let questionCard = e.target.closest('.question-card');
            let firstOptionInput = questionCard.querySelector('input[name^="questions["]');
            let regex = /questions\[(\d+)\]/;
            let match = regex.exec(firstOptionInput.getAttribute('name'));
            let qIndex = match ? match[1] : 0;

            let newOptionDiv = document.createElement('div');
            newOptionDiv.className = 'input-group mb-2';
            newOptionDiv.innerHTML = `
                    <input type="text" class="form-control" name="questions[${qIndex}].options[${currentOptions}]" placeholder="Ответ ${currentOptions + 1}" required>
                    <span class="input-group-text">
                        <input type="checkbox" name="questions[${qIndex}].correctAnswers" value="${currentOptions}">
                    </span>
                `;
            optionsContainer.appendChild(newOptionDiv);
        }
    });

    // Делегирование событий для удаления вопросов по галочке
    document.getElementById('questionsContainer').addEventListener('change', function (e) {
        if (e.target && e.target.classList.contains('delete-question-checkbox')) {
            if (e.target.checked) {
                // Удаляем родительский элемент с классом "question-card"
                let questionCard = e.target.closest('.question-card');
                questionCard.remove();
            }
        }
    });
</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
