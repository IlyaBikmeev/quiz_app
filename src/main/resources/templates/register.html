<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Регистрация</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3 class="text-center">Регистрация</h3>
                </div>
                <div class="card-body">
                    <form id="registerForm">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="mb-3">
                            <label for="name" class="form-label">Никнейм</label>
                            <input type="text" class="form-control" id="name" name="name" required>
                            <div class="form-text">Никнейм должен быть уникальным.</div>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Зарегистрироваться</button>
                        </div>
                    </form>
                    <div class="mt-3 text-center">
                        <a href="/auth/login">Уже есть аккаунт? Войти</a>
                    </div>
                    <div id="messageContainer" class="mt-3" style="display: none;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/auth.js}"></script>
<script>
    document.getElementById('registerForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const name = document.getElementById('name').value;
        const messageContainer = document.getElementById('messageContainer');
        
        // Валидация формы
        if (!email || !name) {
            messageContainer.style.display = 'block';
            messageContainer.innerHTML = `
                <div class="alert alert-danger">
                    Все поля должны быть заполнены
                </div>
            `;
            return;
        }
        
        if (name.length < 3) {
            messageContainer.style.display = 'block';
            messageContainer.innerHTML = `
                <div class="alert alert-danger">
                    Никнейм должен содержать не менее 3 символов
                </div>
            `;
            return;
        }
        
        // Отключаем кнопку во время запроса
        const submitButton = this.querySelector('button[type="submit"]');
        submitButton.disabled = true;
        submitButton.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Регистрация...';
        
        fetch('/auth/register', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-Requested-With': 'XMLHttpRequest'
            },
            body: JSON.stringify({ email: email, name: name })
        })
        .then(response => {
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            return response.json();
        })
        .then(data => {
            messageContainer.style.display = 'block';
            
            if (data.message && data.message.includes("уже существует")) {
                // Ошибка регистрации
                messageContainer.innerHTML = `
                    <div class="alert alert-danger">
                        ${data.message}
                    </div>
                `;
                // Восстанавливаем кнопку
                submitButton.disabled = false;
                submitButton.innerHTML = 'Зарегистрироваться';
            } else {
                // Успешная регистрация
                messageContainer.innerHTML = `
                    <div class="alert alert-success">
                        ${data.message}
                        <hr>
                        <a href="/auth/verify?email=${encodeURIComponent(email)}" class="btn btn-sm btn-primary">Ввести код</a>
                    </div>
                `;
                
                // Автоматически перенаправляем на страницу ввода кода
                setTimeout(() => {
                    window.location.href = `/auth/verify?email=${encodeURIComponent(email)}`;
                }, 1500);
            }
        })
        .catch(error => {
            messageContainer.style.display = 'block';
            messageContainer.innerHTML = `
                <div class="alert alert-danger">
                    Произошла ошибка: ${error.message}
                </div>
            `;
            // Восстанавливаем кнопку
            submitButton.disabled = false;
            submitButton.innerHTML = 'Зарегистрироваться';
        });
    });
</script>
</body>
</html>
