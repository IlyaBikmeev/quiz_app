<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" th:fragment="layout(title, content)" class="h-100">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">QuizForge</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@mdi/font@7.4.47/css/materialdesignicons.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <style>
        /* Стили для прикрепления футера к низу */
        body {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        main {
            flex: 1 0 auto;
            padding-bottom: 2rem; /* Отступ внизу для страниц с малым контентом */
        }
        
        footer {
            flex-shrink: 0;
        }
    </style>
</head>
<body class="bg-light d-flex flex-column min-vh-100">

<!-- Включаем общую шапку -->
<div th:replace="~{fragments/header :: header}"></div>

<!-- Основной блок с контентом -->
<div th:replace="${content}"></div>

<!-- Подвал -->
<div th:replace="~{fragments/footer :: footer}"></div>

<!-- Общие скрипты -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/auth.js}"></script>

</body>
</html>
