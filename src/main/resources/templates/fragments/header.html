<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>
<!-- Фрагмент шапки -->
<div th:fragment="header">
    <nav class="navbar navbar-expand-lg navbar-light bg-light">
        <div class="container">
            <a class="navbar-brand" th:href="@{/}">QuizForge</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
                    aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" th:href="@{/}">Главная</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" th:href="@{/quiz}">Квизы</a>
                    </li>
                    <li class="nav-item" sec:authorize="isAuthenticated()">
                        <a class="nav-link" th:href="@{/quiz/new}">Создать квиз</a>
                    </li>
                </ul>
                <ul class="navbar-nav">
                    <li class="nav-item" sec:authorize="!isAuthenticated()">
                        <a class="nav-link" th:href="@{/auth/login}">Войти</a>
                    </li>
                    <li class="nav-item dropdown" sec:authorize="isAuthenticated()">
                        <a class="nav-link dropdown-toggle d-flex align-items-center" href="#" id="navbarDropdown" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                            <div class="avatar-circle me-2">
                                <span class="avatar-text" id="user-avatar-initial">?</span>
                            </div>
                            <span id="user-display-name">Загрузка...</span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="navbarDropdown">
                            <li><a class="dropdown-item" th:href="@{/user/profile}">Профиль</a></li>
                            <li><a class="dropdown-item" th:href="@{/user/settings}">Настройки</a></li>
                            <li><hr class="dropdown-divider"></li>
                            <li><a class="dropdown-item" href="#" onclick="logout(); return false;">Выйти</a></li>
                        </ul>
                    </li>
                </ul>
            </div>
        </div>
    </nav>
    
    <!-- Добавляем CSS для аватара -->
    <style>
        .avatar-circle {
            width: 32px;
            height: 32px;
            background-color: #007bff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            text-transform: uppercase;
        }
        .navbar .dropdown-toggle::after {
            margin-left: 0.5em;
        }
    </style>
    
    <!-- Подключаем script для аутентификации -->
    <script th:src="@{/js/auth.js}"></script>
    <script>
        function logout() {
            // Очищаем токен в localStorage и cookie
            clearAuthToken();
            // Делаем запрос на сервер для очистки сессии и перенаправляем на страницу логина
            window.location.href = '/auth/logout';
        }
        
        // Загружаем информацию о пользователе после загрузки страницы
        document.addEventListener('DOMContentLoaded', function() {
            // Проверяем, авторизован ли пользователь
            const token = getAuthToken();
            if (token) {
                // Загружаем информацию о пользователе
                fetch('/auth/user-info', {
                    method: 'GET',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'X-Requested-With': 'XMLHttpRequest'
                    }
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Ошибка запроса: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.name) {
                        // Обновляем аватар и имя пользователя
                        document.getElementById('user-avatar-initial').textContent = data.name.charAt(0).toUpperCase();
                        document.getElementById('user-display-name').textContent = data.name;
                    }
                })
                .catch(error => {
                    console.error('Ошибка при получении информации о пользователе:', error);
                    // Если ошибка, пытаемся очистить токен и перезагрузить страницу
                    if (error.message.includes('401') || error.message.includes('403')) {
                        clearAuthToken();
                        // На небезопасных страницах перезагружаем
                        if (!window.location.pathname.startsWith('/auth/')) {
                            window.location.reload();
                        }
                    }
                });
            }
        });
    </script>
</div>
</body>
</html>
