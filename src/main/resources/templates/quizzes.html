<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Список квизов</title>
    <!-- Подключаем Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-5">
    <h1 class="text-center mb-4">📚 Доступные квизы</h1>

    <div class="row">
        <div class="col-md-8 offset-md-2">
            <div class="list-group">
                <!-- Вывод списка квизов -->
                <a th:each="quiz : ${quizPage.content}"
                   th:href="@{'/quiz/' + ${quiz.id}}"
                   class="list-group-item list-group-item-action d-flex justify-content-between align-items-center">
                    <span th:text="${quiz.title}">Название квиза</span>
                    <span class="badge bg-primary rounded-pill">Начать ➡️</span>
                </a>
            </div>
        </div>
    </div>

    <!-- Пагинация -->
    <nav class="mt-4">
        <ul class="pagination justify-content-center">
            <li class="page-item" th:classappend="${!quizPage.hasPrevious()} ? 'disabled'">
                <a class="page-link" th:href="@{'/quiz?page=' + ${quizPage.number - 1} + '&size=' + ${quizPage.size}}" tabindex="-1">
                    ⬅️ Предыдущая
                </a>
            </li>

            <li class="page-item disabled">
                <span class="page-link">Страница <span th:text="${quizPage.number + 1}"></span> из <span th:text="${quizPage.totalPages}"></span></span>
            </li>

            <li class="page-item" th:classappend="${!quizPage.hasNext()} ? 'disabled'">
                <a class="page-link" th:href="@{'/quiz?page=' + ${quizPage.number + 1} + '&size=' + ${quizPage.size}}">
                    Следующая ➡️
                </a>
            </li>
        </ul>
    </nav>
</div>

<!-- Подключаем Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
