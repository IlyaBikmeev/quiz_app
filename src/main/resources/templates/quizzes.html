<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Список квизов</title>
</head>
<body>

<main class="container mt-5">
    <h1 class="text-center mb-4">📚 Доступные квизы</h1>

    <div class="row justify-content-center">
        <div class="col-12 col-md-8">
            <div class="list-group">
                <!-- Вывод списка квизов -->
                <div th:each="quiz : ${quizPage.content}" class="list-group-item">
                    <div class="d-flex justify-content-between align-items-center">
                        <div>
                            <h5 th:text="${quiz.title}">Название квиза</h5>
                            <p class="mb-0 text-muted"><small>Автор: <span th:text="${quiz.creatorName}">Автор</span></small></p>
                        </div>
                        <a th:href="@{'/quiz/' + ${quiz.id}}" class="btn btn-primary btn-sm">Начать ➡️</a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Пагинация -->
    <nav class="mt-4">
        <ul class="pagination justify-content-center flex-wrap">
            <li class="page-item" th:classappend="${!quizPage.hasPrevious()} ? 'disabled'">
                <a class="page-link" th:href="@{'/quiz?page=' + ${quizPage.number - 1} + '&size=' + ${quizPage.size}}" tabindex="-1">
                    ⬅️ Предыдущая
                </a>
            </li>

            <li class="page-item disabled">
                <span class="page-link">Страница <span th:text="${quizPage.number + 1}"></span> из <span th:text="${quizPage.totalPages}"></span></span>
            </li>

            <li class="page-item" th:classappend="${!quizPage.hasNext()} ? 'disabled'">
                <a class="page-link" th:href="@{'/quiz?page=' + ${quizPage.number + 1} + '&size=' + ${quizPage.size}}">
                    Следующая ➡️
                </a>
            </li>
        </ul>
    </nav>
</main>

</body>
</html>
