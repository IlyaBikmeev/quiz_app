<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Профиль пользователя</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h3 class="text-center">Профиль пользователя</h3>
                </div>
                <div class="card-body">
                    <div class="row">
                        <div class="col-md-4 text-center mb-4">
                            <div class="avatar-circle mx-auto mb-3" style="width: 150px; height: 150px; font-size: 48px;">
                                <span th:text="${#strings.substring(user.name, 0, 1)}"></span>
                            </div>
                            <h4 th:text="${user.name}"></h4>
                        </div>
                        <div class="col-md-8">
                            <div class="mb-3">
                                <h5>Информация о пользователе</h5>
                                <hr>
                                <div class="row mb-2">
                                    <div class="col-md-4 fw-bold">Email:</div>
                                    <div class="col-md-8" th:text="${user.email}"></div>
                                </div>
                                <div class="row mb-2">
                                    <div class="col-md-4 fw-bold">Никнейм:</div>
                                    <div class="col-md-8" th:text="${user.name}"></div>
                                </div>
                            </div>
                            
                            <div>
                                <h5>Статистика</h5>
                                <hr>
                                <p class="fst-italic text-muted">Статистика будет доступна в будущих обновлениях</p>
                            </div>
                            
                            <div class="mt-4">
                                <a th:href="@{/user/settings}" class="btn btn-primary">Редактировать профиль</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/auth.js}"></script>

<!-- Стили для аватара -->
<style>
    .avatar-circle {
        background-color: #007bff;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-weight: bold;
        text-transform: uppercase;
    }
</style>
</body>
</html>
