<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Настройки профиля</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card">
                <div class="card-header">
                    <h3 class="text-center">Настройки профиля</h3>
                </div>
                <div class="card-body">
                    <form id="settingsForm">
                        <div class="row mb-4">
                            <div class="col-md-3 text-center">
                                <div class="avatar-circle mx-auto mb-3" style="width: 100px; height: 100px; font-size: 36px;">
                                    <span th:text="${#strings.substring(user.name, 0, 1)}"></span>
                                </div>
                                <div class="fst-italic text-muted">
                                    Аватар формируется из первой буквы никнейма
                                </div>
                            </div>
                            <div class="col-md-9">
                                <div class="mb-3">
                                    <label for="email" class="form-label">Email</label>
                                    <input type="email" class="form-control" id="email" th:value="${user.email}" readonly>
                                    <div class="form-text">Email нельзя изменить</div>
                                </div>
                                <div class="mb-3">
                                    <label for="name" class="form-label">Никнейм</label>
                                    <input type="text" class="form-control" id="name" th:value="${user.name}" required>
                                    <div class="form-text">Никнейм должен быть уникальным</div>
                                </div>
                            </div>
                        </div>
                        
                        <div class="mb-3">
                            <h5>Настройки уведомлений</h5>
                            <hr>
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="emailNotifications" checked disabled>
                                <label class="form-check-label" for="emailNotifications">Получать уведомления на email</label>
                                <div class="form-text">Эта функция будет доступна в будущих обновлениях</div>
                            </div>
                        </div>
                        
                        <div class="d-grid gap-2 d-md-flex justify-content-md-end">
                            <a th:href="@{/user/profile}" class="btn btn-secondary me-md-2">Отмена</a>
                            <button type="submit" class="btn btn-primary">Сохранить изменения</button>
                        </div>
                    </form>
                    
                    <div id="messageContainer" class="mt-3" style="display: none;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/auth.js}"></script>

<!-- Стили для аватара -->
<style>
    .avatar-circle {
        background-color: #007bff;
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
        font-weight: bold;
        text-transform: uppercase;
    }
</style>

<script>
    document.getElementById('settingsForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const name = document.getElementById('name').value;
        const messageContainer = document.getElementById('messageContainer');
        
        if (!name || name.length < 3) {
            messageContainer.style.display = 'block';
            messageContainer.innerHTML = `
                <div class="alert alert-danger">
                    Никнейм должен содержать не менее 3 символов
                </div>
            `;
            return;
        }
        
        // Заглушка: Реальный запрос к API будет добавлен позже
        messageContainer.style.display = 'block';
        messageContainer.innerHTML = `
            <div class="alert alert-info">
                Функционал изменения настроек будет доступен в будущих обновлениях
            </div>
        `;
    });
</script>
</body>
</html>
