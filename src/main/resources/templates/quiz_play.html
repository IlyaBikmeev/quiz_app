<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz Title</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css"
          integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T" crossorigin="anonymous">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>
<div class="container mt-5 px-3 px-md-5">
    <div id="question-container" class="question-block">
    </div>
    <div id="alert-container" class="mt-3"></div>
    <div id="statistics-container" class="mt-3"></div>
    <button id="next-button" class="btn btn-primary mt-3" onclick="loadNextQuestion()" style="display: none;">Следующий
        вопрос
    </button>
</div>
</body>

<script th:inline="javascript">
    let attemptId = [[${attempt.id}]];
    let quizId = [[${attempt.quizId}]];
    let currentQuestion = 0;
    let questions = [[${attempt.questions}]];

    function displayQuestion() {
        document.getElementById('alert-container').innerHTML = '';
        if (currentQuestion < questions.length) {
            let question = questions[currentQuestion];
            let questionContainer = document.getElementById('question-container');
            questionContainer.innerHTML = `
                    <h3 class="h4 h3-md">${question.text}</h3>
                    ${question.options.map((option, index) => `
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="checkbox" name="question_${question.id}" id="option_${index}" value="${index}">
                            <label class="form-check-label" for="option_${index}">
                                ${option}
                            </label>
                        </div>
                    `).join('')}
                    <button id="submit-button" class="btn btn-success mt-3" onclick="submitAnswer()">Ответить</button>
                `;
        } else {
            document.getElementById('question-container').innerHTML = `
                <h3 class="h4 h3-md">Викторина завершена!</h3>
                <a href="/" class="btn btn-primary mt-3">На главную</a>`;
        }
    }

    function submitAnswer() {
        let question = questions[currentQuestion];
        let selectedOptions = Array.from(document.querySelectorAll('input[name="question_' + question.id + '"]:checked'));
        let alertContainer = document.getElementById('alert-container');
        let submitButton = document.getElementById('submit-button');
        if (!selectedOptions) {
            alertContainer.innerHTML = `<div class="alert alert-warning" role="alert">Пожалуйста, выберите вариант ответа.</div>`;
            return;
        }

        submitButton.disabled = true;

        let answerIndexes = selectedOptions.map(option => parseInt(option.value));

        let payload = {
            quizId: quizId,
            questionId: question.id,
            answers: answerIndexes
        };

        fetch(`/api/v1/attempts/${attemptId}/answer`, {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify(payload)
        })
            .then(response => {
                if (!response.ok) {
                    throw new Error('Ошибка сервера');
                }
                return response.json();
            })
            .then(data => {
                let message = data.correct ? 'Правильно!' : 'Неправильно!';
                alertContainer.innerHTML = `<div class="alert ${data.correct ? 'alert-success' : 'alert-danger'}" role="alert">${message}</div>`;

                // Показать правильные ответы если пользователь ответил неправильно
                if (!data.correct) {
                    let correctAnswersHtml = `
                    <div class="alert alert-info" role="alert">
                        <p>Правильный ответ:</p>
                        <ul>
                            ${data.correctAnswers.map((index) => `<li>${question.options[index]}</li>`).join('')}
                        </ul>
                    </div>`;
                    alertContainer.innerHTML += correctAnswersHtml;
                }

                document.getElementById('statistics-container').innerHTML = `
                <p>Вопросов отвечено: ${data.answeredQuestions} из ${data.totalQuestions}</p>
                <p>Правильных ответов: ${data.correctAnswersCount}</p>`;

                document.querySelectorAll('input[name="question_' + question.id + '"]').forEach(input => {
                    input.disabled = true;
                });

                submitButton.style.display = 'none';
                document.getElementById('next-button').style.display = 'block';
            })
            .catch(error => {
                alertContainer.innerHTML = `<div class="alert alert-danger" role="alert">Ошибка: ${error.message}</div>`;
                submitButton.disabled = false;
            });

    }

    function loadNextQuestion() {
        currentQuestion++;
        displayQuestion();
        document.getElementById('next-button').style.display = 'none';
    }

    displayQuestion();
</script>
</html>
