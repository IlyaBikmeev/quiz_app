<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Подтверждение кода</title>
</head>
<body>

<main class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3 class="text-center">Введите код подтверждения</h3>
                </div>
                <div class="card-body">
                    <p class="text-center">На ваш email был отправлен код подтверждения. Пожалуйста, введите его ниже.</p>
                    <form id="verifyForm">
                        <input type="hidden" id="email" name="email">
                        <div class="mb-3">
                            <label for="otp" class="form-label">Код подтверждения</label>
                            <input type="text" class="form-control" id="otp" name="otp" required placeholder="Введите 6-значный код">
                            <div class="form-text">Код действителен в течение 5 минут</div>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Подтвердить</button>
                        </div>
                    </form>
                    <div id="messageContainer" class="mt-3" style="display: none;"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Скрипт для подтверждения кода -->
    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function() {
            // Получаем email из параметров URL
            const urlParams = new URLSearchParams(window.location.search);
            const email = urlParams.get('email');
            
            if (email) {
                document.getElementById('email').value = email;
            }
            
            document.getElementById('verifyForm').addEventListener('submit', function(e) {
                e.preventDefault();
                
                const email = document.getElementById('email').value;
                const otp = document.getElementById('otp').value;
                const messageContainer = document.getElementById('messageContainer');
                
                // Отключаем кнопку на время проверки
                const submitButton = this.querySelector('button[type="submit"]');
                submitButton.disabled = true;
                submitButton.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Проверка...';
                
                fetch('/auth/verify', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email: email, otp: otp })
                })
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return response.json();
                })
                .then(data => {
                    if (data.token) {
                        // Используем новую функцию для сохранения токена в localStorage и cookie
                        saveAuthToken(data.token);
                        
                        // Показываем кратковременное сообщение об успехе
                        messageContainer.style.display = 'block';
                        messageContainer.innerHTML = `
                            <div class="alert alert-success">
                                Аутентификация успешна. Перенаправление...
                            </div>
                        `;
                        
                        // Сразу перенаправляем на страницу квизов
                        window.location.href = '/quiz';
                    } else {
                        messageContainer.style.display = 'block';
                        messageContainer.innerHTML = `
                            <div class="alert alert-warning">
                                ${data.message}
                            </div>
                        `;
                        // Восстанавливаем кнопку
                        submitButton.disabled = false;
                        submitButton.innerHTML = 'Подтвердить';
                    }
                })
                .catch(error => {
                    messageContainer.style.display = 'block';
                    messageContainer.innerHTML = `
                        <div class="alert alert-danger">
                            Произошла ошибка: ${error.message}
                        </div>
                    `;
                    // Восстанавливаем кнопку
                    submitButton.disabled = false;
                    submitButton.innerHTML = 'Подтвердить';
                });
            });
        });
    </script>
</main>

</body>
</html>
