<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход в систему</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3 class="text-center">Вход в систему</h3>
                </div>
                <div class="card-body">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Получить код</button>
                        </div>
                    </form>
                    <div id="messageContainer" class="mt-3" style="display: none;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0-alpha1/dist/js/bootstrap.bundle.min.js"></script>
<script th:src="@{/js/auth.js}"></script>
<script>
    // Если пользователь уже авторизован, редиректим на страницу квизов
    document.addEventListener('DOMContentLoaded', function() {
        const token = localStorage.getItem('authToken');
        if (token) {
            window.location.href = '/quiz';
            return;
        }
    });

    document.getElementById('loginForm').addEventListener('submit', function(e) {
        e.preventDefault();
        
        const email = document.getElementById('email').value;
        const messageContainer = document.getElementById('messageContainer');
        
        fetch('/auth/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-Requested-With': 'XMLHttpRequest'
            },
            body: JSON.stringify({ email: email })
        })
        .then(response => {
            if (!response.ok) {
                throw new Error(`HTTP error! status: ${response.status}`);
            }
            return response.json();
        })
        .then(data => {
            messageContainer.style.display = 'block';
            messageContainer.innerHTML = `
                <div class="alert alert-success">
                    ${data.message}
                    <hr>
                    <a href="/auth/verify?email=${encodeURIComponent(email)}" class="btn btn-sm btn-primary">Ввести код</a>
                </div>
            `;
            
            // Автоматически перенаправляем на страницу ввода кода
            setTimeout(() => {
                window.location.href = `/auth/verify?email=${encodeURIComponent(email)}`;
            }, 1500);
        })
        .catch(error => {
            messageContainer.style.display = 'block';
            messageContainer.innerHTML = `
                <div class="alert alert-danger">
                    Произошла ошибка: ${error.message}
                </div>
            `;
        });
    });
</script>
</body>
</html>
