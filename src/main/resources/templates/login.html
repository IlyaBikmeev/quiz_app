<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" 
      th:replace="~{fragments/layout :: layout(~{::title}, ~{::main})}">
<head>
    <title>Вход в систему</title>
</head>
<body>

<main class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header">
                    <h3 class="text-center">Вход в систему</h3>
                </div>
                <div class="card-body">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="email" class="form-label">Email</label>
                            <input type="email" class="form-control" id="email" name="email" required>
                        </div>
                        <div class="d-grid">
                            <button type="submit" class="btn btn-primary">Получить код</button>
                        </div>
                    </form>
                    <div class="mt-3 text-center">
                        <a href="/auth/register">Нет аккаунта? Зарегистрироваться</a>
                    </div>
                    <div id="messageContainer" class="mt-3" style="display: none;"></div>
                </div>
            </div>
        </div>
    </div>
    
    <!-- Скрипт для страницы логина -->
    <script th:inline="javascript">
        document.addEventListener('DOMContentLoaded', function() {
            const token = localStorage.getItem('authToken');
            if (token) {
                window.location.href = '/quiz';
                return;
            }
        });

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const messageContainer = document.getElementById('messageContainer');

            // Отключаем кнопку во время запроса
            const submitButton = this.querySelector('button[type="submit"]');
            submitButton.disabled = true;
            submitButton.innerHTML = '<span class="spinner-border spinner-border-sm" role="status" aria-hidden="true"></span> Получение кода...';
            
            fetch('/auth/login', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'X-Requested-With': 'XMLHttpRequest'
                },
                body: JSON.stringify({ email: email })
            })
            .then(response => {
                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }
                return response.json();
            })
            .then(data => {
                messageContainer.style.display = 'block';
                
                // Проверяем, содержит ли сообщение информацию о том, что пользователь не найден
                if (data.message && data.message.includes("не найден")) {
                    // Пользователь не найден
                    messageContainer.innerHTML = `
                        <div class="alert alert-warning">
                            ${data.message}
                            <hr>
                            <a href="/auth/register" class="btn btn-sm btn-primary">Зарегистрироваться</a>
                        </div>
                    `;
                    // Восстанавливаем кнопку
                    submitButton.disabled = false;
                    submitButton.innerHTML = 'Получить код';
                } else {
                    // Успешный запрос кода
                    messageContainer.innerHTML = `
                        <div class="alert alert-success">
                            ${data.message}
                            <hr>
                            <a href="/auth/verify?email=${encodeURIComponent(email)}" class="btn btn-sm btn-primary">Ввести код</a>
                        </div>
                    `;
                    
                    // Автоматически перенаправляем на страницу ввода кода
                    setTimeout(() => {
                        window.location.href = `/auth/verify?email=${encodeURIComponent(email)}`;
                    }, 1500);
                }
            })
            .catch(error => {
                messageContainer.style.display = 'block';
                messageContainer.innerHTML = `
                    <div class="alert alert-danger">
                        Произошла ошибка: ${error.message}
                    </div>
                `;
                // Восстанавливаем кнопку
                submitButton.disabled = false;
                submitButton.innerHTML = 'Получить код';
            });
        });
    </script>
</main>

</body>
</html>
