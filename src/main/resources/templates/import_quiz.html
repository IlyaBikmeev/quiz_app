<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Импорт квиза из файла</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">
<!-- Вставка общей шапки -->
<div th:replace="~{fragments/header :: header}"></div>

<div class="container mt-5">
    <h1 class="text-center mb-4">Импорт квиза из файла</h1>
    <div class="row justify-content-center">
        <div class="col-md-6">
            <form th:action="@{/quiz/new/import}" method="post" enctype="multipart/form-data">
                <div class="mb-3">
                    <label for="quizFile" class="form-label">Выберите файл для импорта</label>
                    <input type="file" class="form-control" id="quizFile" name="file" required>
                </div>
                <button type="submit" class="btn btn-primary w-100">Импортировать квиз</button>
            </form>
            <div class="mt-3">
                <a th:href="@{/quiz}" class="btn btn-secondary w-100">Вернуться к списку квизов</a>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
