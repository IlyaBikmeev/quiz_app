spring.application.name=quizz

# CORS: разрешённые origin для фронта (через запятую)
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}

spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/quizz}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.sql.init.mode=always
spring.sql.init.platform=h2

# JWT настройки
jwt.secret=${JWT_SECRET:mySuperSecretKeyForJwtTokensInQuizzApplication123456789}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Настройки почты
spring.mail.host=${MAIL_HOST:smtp.mail.ru}
spring.mail.port=${MAIL_PORT:465}
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.protocol=smtp
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true

# Настройки кеша OTP
otp.cache.expire-after-write=${OTP_CACHE_EXPIRATION:300}

# Flyway Configuration
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration