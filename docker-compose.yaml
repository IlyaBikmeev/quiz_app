version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: quizz_postgres
    environment:
      POSTGRES_DB: quizz
      POSTGRES_USER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=${DB_URL:-jdbc:postgresql://postgres:5432/quizz}
      - DB_USERNAME=${DB_USERNAME:-postgres}
      - DB_PASSWORD=${DB_PASSWORD:-postgres}
      - MAIL_USERNAME=${MAIL_USERNAME}
      - MAIL_PASSWORD=${MAIL_PASSWORD}
      # При деплое за nginx запросы идут с того же origin, CORS не нужен
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-}
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "-", "http://localhost:8080/"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Пустой — запросы к API идут на тот же хост, nginx проксирует
        - VITE_API_URL=${VITE_API_URL:-}
    ports:
      - "80:80"
    restart: always
    depends_on:
      app:
        condition: service_healthy

volumes:
  postgres_data:
